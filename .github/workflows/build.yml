name: Build COI Mod (Storable)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. دریافت کد
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. نصب .NET
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 3. restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # 4. build release
      - name: Build project
        run: dotnet build -c Release

      # 5. پیدا کردن DLL (debug صحیح با PowerShell)
      - name: Find Storable DLL
        shell: pwsh
        run: |
          Write-Host "Searching for Storable.dll..."

          $dll = Get-ChildItem -Path . -Recurse -Filter "Storable.dll" -ErrorAction SilentlyContinue

          if ($dll) {
            Write-Host "FOUND DLL:"
            $dll.FullName
          } else {
            Write-Host "DLL NOT FOUND"
            exit 1
          }

      # 6. آپلود artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Storable-mod
          path: |
            **/bin/Release/**/Storable.dll
            **/bin/Release/Storable.dll
            **/Storable.dll
